version: '3.8'

services:
  # Base de Datos de Producción (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: tripoliven_postgres
    environment:
      POSTGRES_DB: tripoliven_db
      POSTGRES_USER: tripoliven_admin
      POSTGRES_PASSWORD: tripoliven_secure_pwd_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripoliven_admin -d tripoliven_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # Servidor Backend (Express + PostgreSQL)
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tripoliven_backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=tripoliven_admin
      - DB_PASSWORD=tripoliven_secure_pwd_2026
      - DB_NAME=tripoliven_db
      - JWT_SECRET=tripoliven_secret_key_de_alta_seguridad_2026
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  # Interfaz Frontend (React + Nginx)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: tripoliven_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always

volumes:
  # Volumen persistente para PostgreSQL
  postgres_data:
